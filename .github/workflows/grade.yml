name: Grade Submission

on:
  pull_request:
    branches: [ main ]

jobs:
  grade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout participant code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas scikit-learn

      - name: Write secret labels to file
        run: echo "${{ secrets.TEST_LABELS }}" > grader/test_labels.csv

      - name: Check submission file exists
        run: |
          count=$(find submission/ -name "*submission.csv" | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "❌ No submission file found in submission/ folder!"
            exit 1
          fi
          echo "✅ Found $count submission file(s)"

      - name: Run grader
        env:
          GROUP_NAME: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python grader/grader.py

      - name: Update leaderboard
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git fetch origin main
          git checkout main

          python3 - <<'EOF'
          import json, os

          new_result_path = "leaderboard_data/result.json"
          leaderboard_path = "docs/leaderboard.json"

          if not os.path.exists(new_result_path):
              print("No result file found, skipping leaderboard update")
              exit(0)

          with open(new_result_path) as f:
              new_result = json.load(f)

          if os.path.exists(leaderboard_path):
              with open(leaderboard_path) as f:
                  leaderboard = json.load(f)
          else:
              leaderboard = []

          existing = next((e for e in leaderboard if e["group"] == new_result["group"]), None)
          if existing:
              if new_result["accuracy"] > existing["accuracy"]:
                  leaderboard = [e for e in leaderboard if e["group"] != new_result["group"]]
                  leaderboard.append(new_result)
                  print(f"Updated {new_result['group']} score to {new_result['accuracy']}%")
              else:
                  print(f"Kept existing better score for {new_result['group']}")
          else:
              leaderboard.append(new_result)
              print(f"Added {new_result['group']} with {new_result['accuracy']}%")

          with open(leaderboard_path, "w") as f:
              json.dump(leaderboard, f, indent=2)

          print("Leaderboard updated!")
          EOF

          git add docs/leaderboard.json
          git diff --staged --quiet || git commit -m "Update leaderboard after PR #${{ github.event.pull_request.number }}"
          git push origin main
